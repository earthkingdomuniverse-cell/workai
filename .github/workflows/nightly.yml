/**
 * Nightly Regression Workflow
 * Task 8.3: Nightly Regression Workflow
 * 
 * Runs full regression test suite nightly
 */

name: Nightly Regression Tests

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20.19.0'
  DATABASE_URL: postgresql://test:test@localhost:5432/workai_test
  JWT_SECRET: test-jwt-secret-for-ci

jobs:
  # ----------------------------------------
  # Job 1: Setup
  # ----------------------------------------
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: |
          npx playwright install
          npx playwright install-deps

      - name: Cache browser binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

  # ----------------------------------------
  # Job 2: Database Setup
  # ----------------------------------------
  database:
    name: Setup Database
    runs-on: ubuntu-latest
    needs: setup
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: workai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup database
        run: |
          npm run db:generate
          npm run db:migrate:test
          npm run db:seed:test

  # ----------------------------------------
  # Job 3: Unit Tests (All)
  # ----------------------------------------
  unit-tests:
    name: Full Unit Test Suite
    runs-on: ubuntu-latest
    needs: [setup, database]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (shard ${{ matrix.shard }}/4)
        run: |
          npm run test:unit -- \
            --shard=${{ matrix.shard }}/4 \
            --coverage \
            --reporters=default \
            --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./reports
          JEST_JUNIT_OUTPUT_NAME: junit-unit-${{ matrix.shard }}.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-shard-${{ matrix.shard }}
          path: |
            reports/junit-unit-${{ matrix.shard }}.xml
            coverage/

  # ----------------------------------------
  # Job 4: Integration Tests (Full)
  # ----------------------------------------
  integration-tests:
    name: Full Integration Test Suite
    runs-on: ubuntu-latest
    needs: [setup, database]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: workai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup database
        run: |
          npm run db:generate
          npm run db:migrate:test
          npm run db:seed:test

      - name: Run full integration tests
        run: |
          npm run test:integration -- \
            --reporters=default \
            --reporters=jest-junit
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: redis://localhost:6379/1
          JEST_JUNIT_OUTPUT_DIR: ./reports
          JEST_JUNIT_OUTPUT_NAME: junit-integration.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: |
            reports/junit-integration.xml
            coverage/

  # ----------------------------------------
  # Job 5: E2E Tests (Browser Matrix)
  # ----------------------------------------
  e2e-tests:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [setup, database]
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: workai_test
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: |
          npx playwright install ${{ matrix.browser }}
          npx playwright install-deps ${{ matrix.browser }}

      - name: Setup database
        run: |
          npm run db:generate
          npm run db:migrate:test
          npm run db:seed:test

      - name: Start application
        run: |
          npm run build
          npm start &
          sleep 10
          curl -f http://localhost:3000/health || exit 1

      - name: Run E2E tests (${{ matrix.browser }})
        run: |
          npx playwright test \
            --project=${{ matrix.browser }} \
            --reporter=junit,html
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_FILE: ./reports/e2e-${{ matrix.browser }}.xml

      - name: Upload E2E results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-${{ matrix.browser }}
          path: |
            reports/e2e-${{ matrix.browser }}.xml
            playwright-report/
            test-results/

  # ----------------------------------------
  # Job 6: Visual Regression
  # ----------------------------------------
  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Run visual tests
        run: |
          npx playwright test tests/e2e/visual --project=chromium
        continue-on-error: true

      - name: Upload visual diff
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-regression-diff
          path: test-results/

  # ----------------------------------------
  # Job 7: Security Regression
  # ----------------------------------------
  security-regression:
    name: Security Regression
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP ZAP scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-scan-report
          path: report_*

  # ----------------------------------------
  # Job 8: Accessibility Tests
  # ----------------------------------------
  a11y-tests:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    needs: [setup, database]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Start application
        run: |
          npm run build
          npm start &
          sleep 10

      - name: Run accessibility tests
        run: npm run test:a11y

      - name: Upload a11y results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-test-results
          path: reports/a11y/

  # ----------------------------------------
  # Job 9: Regression Report
  # ----------------------------------------
  regression-report:
    name: Generate Regression Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, visual-regression, security-regression, a11y-tests]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: ./reports

      - name: Generate regression report
        run: |
          node scripts/generate-regression-report.js \
            --input ./reports \
            --output ./reports/regression-report.md

      - name: Upload regression report
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: ./reports/regression-report.md

      - name: Comment on commit
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('./reports/regression-report.md', 'utf8');
            
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: report,
            });

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        if: failure()
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: 'Nightly Regression Tests Failed - ${{ github.repository }}'
          to: ${{ secrets.QA_EMAIL }}
          from: ${{ secrets.EMAIL_FROM }}
          html_body: |
            <h2>Nightly Regression Tests Failed</h2>
            <p>Repository: ${{ github.repository }}</p>
            <p>Branch: ${{ github.ref }}</p>
            <p>Commit: ${{ github.sha }}</p>
            <p><a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Details</a></p>

      - name: Check for failures
        if: |
          needs.unit-tests.result == 'failure' ||
          needs.integration-tests.result == 'failure' ||
          needs.e2e-tests.result == 'failure'
        run: |
          echo "❌ Some tests failed. Check the report above."
          exit 1

      - name: Success notification
        if: success()
        run: |
          echo "✅ All regression tests passed!"
