# ============================================
# Production Deploy Workflow
# Builds, pushes and deploys with secret injection
# ============================================

name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOYMENT_NAME: workai-backend

jobs:
  # ----------------------------------------
  # Job 1: Build and Push Docker Image
  # ----------------------------------------
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ----------------------------------------
  # Job 2: Deploy to Production Server
  # ----------------------------------------
  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'production' }}
      url: ${{ vars.APP_URL }}

    steps:
      - name: Deploy via SSH with Secret Injection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || '22' }}
          script_stop: true
          envs: GITHUB_SHA
          script: |
            set -euo pipefail

            echo "🚀 Starting deployment..."
            echo "📦 Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

            # Create env file with all secrets
            mkdir -p ~/workai-config
            cat > ~/workai-config/.env << 'ENVEOF'
            # Environment
            NODE_ENV=production
            PORT=${{ vars.APP_PORT || '3000' }}
            HOST=0.0.0.0
            LOG_LEVEL=${{ vars.LOG_LEVEL || 'info' }}

            # API
            API_PREFIX=/api
            API_VERSION=v1

            # CORS
            CORS_ORIGIN=${{ vars.CORS_ORIGIN || '*' }}

            # JWT (from secrets)
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=${{ vars.JWT_EXPIRES_IN || '7d' }}

            # Supabase (from secrets)
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

            # OpenAI (from secrets)
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}

            # Database (from secrets)
            DATABASE_URL=${{ secrets.DATABASE_URL }}

            # Redis (from secrets)
            REDIS_URL=${{ secrets.REDIS_URL }}

            # External Services
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}

            # Email Service
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}

            # Monitoring
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}

            # App Info
            APP_NAME=${{ vars.APP_NAME || 'SkillValue AI' }}
            APP_VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            COMMIT_SHA=${{ github.sha }}
            ENVEOF

            # Secure the env file
            chmod 600 ~/workai-config/.env

            # Login to registry
            echo "🔑 Logging into container registry..."
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # Pull new image
            echo "📥 Pulling new image..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

            # Backup current container (for rollback)
            echo "💾 Creating backup..."
            docker rename ${{ env.DEPLOYMENT_NAME }} ${{ env.DEPLOYMENT_NAME }}-backup 2>/dev/null || true

            # Stop and remove old container
            echo "🛑 Stopping old container..."
            docker stop ${{ env.DEPLOYMENT_NAME }} 2>/dev/null || true
            docker rm ${{ env.DEPLOYMENT_NAME }} 2>/dev/null || true

            # Start new container with env file
            echo "▶️ Starting new container..."
            docker run -d \
              --name ${{ env.DEPLOYMENT_NAME }} \
              --env-file ~/workai-config/.env \
              -p ${{ vars.APP_PORT || '3000' }}:3000 \
              --restart unless-stopped \
              --health-cmd="node -e \"require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\" || exit 1" \
              --health-interval=30s \
              --health-timeout=3s \
              --health-start-period=5s \
              --health-retries=3 \
              -v ~/workai-config:/app/config:ro \
              --log-driver json-file \
              --log-opt max-size=10m \
              --log-opt max-file=5 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

            # Health check
            echo "🏥 Waiting for health check..."
            sleep 5
            for i in {1..12}; do
              if docker exec ${{ env.DEPLOYMENT_NAME }} node -e "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))" 2>/dev/null; then
                echo "✅ Health check passed!"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "❌ Health check failed after 60 seconds"
                echo "🔄 Rolling back..."
                docker stop ${{ env.DEPLOYMENT_NAME }}
                docker rm ${{ env.DEPLOYMENT_NAME }}
                docker rename ${{ env.DEPLOYMENT_NAME }}-backup ${{ env.DEPLOYMENT_NAME }} 2>/dev/null || true
                docker start ${{ env.DEPLOYMENT_NAME }} 2>/dev/null || true
                exit 1
              fi
              echo "⏳ Waiting for container to be healthy... ($i/12)"
              sleep 5
            done

            # Cleanup backup
            echo "🧹 Cleaning up..."
            docker rm -f ${{ env.DEPLOYMENT_NAME }}-backup 2>/dev/null || true
            docker system prune -f --volumes 2>/dev/null || true

            echo "✅ Deployment successful!"
            echo "🌐 Application is running at: ${{ vars.APP_URL }}"

      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/id_rsa

  # ----------------------------------------
  # Job 3: Verify Deployment
  # ----------------------------------------
  verify:
    name: Verify Deployment
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait and verify
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 10

      - name: Health Check
        run: |
          curl -f ${{ vars.APP_URL }}/health || exit 1

      - name: Notify Success
        if: success()
        run: |
          echo "✅ Deployment verified successfully!"
          echo "🌐 URL: ${{ vars.APP_URL }}"
          echo "📦 Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
