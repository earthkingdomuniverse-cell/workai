name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/workai-backend:latest .
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository }}/workai-backend:latest
      - name: Deploy to Production (SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          script: |
            docker pull ghcr.io/${{ github.repository }}/workai-backend:latest
            docker rm -f workai-backend || true
            docker run -d --name workai-backend -p 3000:3000 --restart unless-stopped ghcr.io/${{ github.repository }}/workai-backend:latest
