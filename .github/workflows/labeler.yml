name: 🏷️ PR Labeler

on:
  pull_request_target:
    branches: [main]

jobs:
  label:
    name: 🏷️ Auto Label
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 🏷️ Label PR
        uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          sync-labels: true
