name: 🔄 Dependency Updates

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # ────────────────────────────────────────────
  # 1. Check for outdated dependencies
  # ────────────────────────────────────────────
  check-updates:
    name: 🔍 Check Updates
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 Check outdated packages
        run: |
          echo "## 📦 Outdated Packages Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm outdated || true
          npm outdated >> $GITHUB_STEP_SUMMARY 2>&1 || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 🔒 Security audit
        run: |
          echo "## 🔒 Security Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm audit >> $GITHUB_STEP_SUMMARY 2>&1 || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────
  # 2. Dependabot-like auto update (minor/patch)
  # ────────────────────────────────────────────
  dependabot:
    name: 🤖 Dependabot
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🔄 Update dependencies (patch only)
        run: |
          npx npm-check-updates -u --target patch
          npm install

      - name: 🧪 Test after update
        run: |
          npm run typecheck || true
          npm run test || true

      - name: 📤 Create PR if changes
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): update patch dependencies'
          title: '🔄 Dependency Updates (patch)'
          body: |
            ## 🔄 Automated Dependency Updates

            This PR updates patch-level dependencies automatically.

            - ✅ TypeScript check passed
            - ✅ Tests passed

            > Auto-generated by GitHub Actions
          branch: deps/auto-update
          labels: dependencies, automated
