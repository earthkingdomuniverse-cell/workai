# ============================================
# Branch Protection Rules
# Enforce branch protection programmatically
# ============================================

name: Branch Protection

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  administration: write

jobs:
  protect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Branch Protection
        uses: github/octokit-action@v2
        with:
          route: PUT /repos/{owner}/{repo}/branches/{branch}/protection
          owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
          branch: main
        env:
          GITHUB_TOKEN: ${{ secrets.ADMIN_TOKEN || secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Apply Protection Rules
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADMIN_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const rules = {
              required_status_checks: {
                strict: true,
                contexts: [
                  'CI',
                  'Lint',
                  'Test',
                  'CodeQL',
                  'SonarQube'
                ]
              },
              enforce_admins: false,
              required_pull_request_reviews: {
                required_approving_review_count: 1,
                dismiss_stale_reviews: true,
                require_code_owner_reviews: true,
                required_reviewers: ['earthkingdomuniverse-cell']
              },
              restrictions: null,
              allow_force_pushes: false,
              allow_deletions: false,
              required_linear_history: true,
              required_signatures: false,
              required_conversation_resolution: true
            };

            try {
              await github.rest.repos.updateBranchProtection({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: 'main',
                ...rules
              });
              console.log('✅ Branch protection rules applied');
            } catch (error) {
              console.log('⚠️ Could not apply branch protection:', error.message);
              console.log('Note: Admin token may be required for this action');
            }
