name: 📊 Repository Health

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  health-report:
    name: 📊 Weekly Health Report
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            mobile/package-lock.json

      - name: 📥 Install backend dependencies
        run: npm ci

      - name: 📥 Install mobile dependencies
        run: npm ci
        working-directory: mobile

      - name: 📊 Generate report
        run: |
          {
            echo "## Repository health"
            echo ""
            echo "### Backend"
            echo '```'
            npm outdated || true
            echo '```'
            echo ""
            echo "### Mobile"
            echo '```'
            npm outdated --prefix mobile || true
            echo '```'
            echo ""
            echo "### Security audit"
            echo '```'
            npm audit --audit-level=high || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
