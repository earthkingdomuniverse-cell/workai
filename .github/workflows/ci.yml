name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Lint
        run: npm run lint
        working-directory: .

      - name: Typecheck
        run: npm run typecheck
        working-directory: .

      - name: Run unit tests
        run: npm test
        working-directory: .

      - name: Build backend
        run: npm run build
        working-directory: .
