name: 🚀 CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────
  # 1. Lint & Format Check
  # ────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 ESLint
        run: npm run lint

      - name: 💅 Prettier check changed files
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "No diff base available; checking curated source paths."
            npx prettier --check README.md CONTRIBUTING.md SECURITY.md PRODUCT.md docs .github mobile/src mobile/app src scripts
            exit 0
          fi

          mapfile -t FILES < <(
            git diff --name-only "$BASE_SHA" "${{ github.sha }}" \
              | grep -E '\.(md|json|ya?ml|ts|tsx|js|jsx|css|html)$' \
              | grep -v '^mobile/.expo/' || true
          )

          if [[ "${#FILES[@]}" -eq 0 ]]; then
            echo "No Prettier-supported changed files detected."
            exit 0
          fi

          printf '%s\n' "${FILES[@]}"
          printf '%s\0' "${FILES[@]}" | xargs -0 npx prettier --check

  # ────────────────────────────────────────────
  # 2. Type Check
  # ────────────────────────────────────────────
  typecheck:
    name: 🏷️ Type Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🏷️ TypeScript check
        run: npm run typecheck

  # ────────────────────────────────────────────
  # 3. Unit Tests
  # ────────────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🧪 Run tests with coverage
        run: npm run test:coverage

      - name: 📊 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ────────────────────────────────────────────
  # 4. Build
  # ────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 📦 Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # ────────────────────────────────────────────
  # 5. Security Audit
  # ────────────────────────────────────────────
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔒 Run npm audit
        run: npm audit --audit-level=critical

      - name: 🔒 Run audit-ci
        run: npm run security-check
