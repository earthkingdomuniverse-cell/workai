name: Manual Backend Runtime Smoke

on:
  workflow_dispatch:

jobs:
  backend-smoke:
    name: Backend HTTP smoke verification
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: workai
          POSTGRES_PASSWORD: workai
          POSTGRES_DB: workai_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3000
      HOST: 0.0.0.0
      LOG_LEVEL: error
      API_PREFIX: /api
      API_VERSION: v1
      CORS_ORIGIN: '*'
      ENABLE_MOCK_MODE: 'true'
      ENABLE_ADMIN_TAB: 'true'
      ENABLE_SWAGGER: 'false'
      DATABASE_URL: postgresql://workai:workai@localhost:5432/workai_smoke?schema=public
      JWT_SECRET: smoke-test-secret
      SMOKE_PROVIDER_ID: 11111111-1111-4111-8111-111111111111
      SMOKE_CLIENT_ID: 33333333-3333-4333-8333-333333333333
      SMOKE_OFFER_ID: 22222222-2222-4222-8222-222222222222

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed offer and deal smoke data
        run: |
          node <<'NODE'
          const { PrismaClient } = require('@prisma/client');
          const prisma = new PrismaClient();

          async function main() {
            const providerId = process.env.SMOKE_PROVIDER_ID;
            const clientId = process.env.SMOKE_CLIENT_ID;
            const offerId = process.env.SMOKE_OFFER_ID;

            await prisma.user.upsert({
              where: { id: providerId },
              update: {
                email: 'provider-smoke@example.com',
                trustScore: 87,
              },
              create: {
                id: providerId,
                email: 'provider-smoke@example.com',
                passwordHash: 'smoke-password-hash',
                role: 'member',
                trustScore: 87,
              },
            });

            await prisma.user.upsert({
              where: { id: clientId },
              update: {
                email: 'client-smoke@example.com',
                trustScore: 91,
              },
              create: {
                id: clientId,
                email: 'client-smoke@example.com',
                passwordHash: 'smoke-password-hash',
                role: 'member',
                trustScore: 91,
              },
            });

            await prisma.offer.upsert({
              where: { id: offerId },
              update: {
                providerId,
                title: 'Smoke Test Offer Detail',
                description: 'Smoke test offer used to verify public offer detail provider contract.',
                category: 'testing',
                price: 123,
                currency: 'USD',
                pricingType: 'fixed',
                status: 'active',
              },
              create: {
                id: offerId,
                providerId,
                title: 'Smoke Test Offer Detail',
                description: 'Smoke test offer used to verify public offer detail provider contract.',
                category: 'testing',
                price: 123,
                currency: 'USD',
                pricingType: 'fixed',
                status: 'active',
              },
            });
          }

          main()
            .catch((error) => {
              console.error(error);
              process.exit(1);
            })
            .finally(async () => {
              await prisma.$disconnect();
            });
          NODE

      - name: Build backend
        run: npm run build

      - name: Start backend
        run: |
          node dist/server.js > backend-smoke.log 2>&1 &
          echo $! > backend-smoke.pid

      - name: Wait for health endpoint
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/health > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 2
          done
          echo 'Backend did not become healthy'
          cat backend-smoke.log || true
          exit 1

      - name: Verify health response
        run: |
          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('/tmp/health.json','utf8')); if(data.status !== 'ok') { console.error(data); process.exit(1); }"

      - name: Smoke public offer detail provider contract
        run: |
          status=$(curl -sS -o /tmp/offer-detail.json -w '%{http_code}' "http://127.0.0.1:3000/api/v1/offers/${SMOKE_OFFER_ID}")
          cat /tmp/offer-detail.json
          if [ "$status" != "200" ]; then
            echo "Expected 200 for offer detail, got ${status}"
            exit 1
          fi
          node <<'NODE'
          const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync('/tmp/offer-detail.json', 'utf8'));
          const offer = payload.data;

          if (!offer) {
            console.error('Missing data wrapper', payload);
            process.exit(1);
          }

          const expected = {
            id: process.env.SMOKE_OFFER_ID,
            providerId: process.env.SMOKE_PROVIDER_ID,
            title: 'Smoke Test Offer Detail',
            providerEmail: 'provider-smoke@example.com',
            providerTrustScore: 87,
          };

          if (offer.id !== expected.id || offer.providerId !== expected.providerId || offer.title !== expected.title) {
            console.error('Offer core fields mismatch', { offer, expected });
            process.exit(1);
          }

          if (!offer.provider) {
            console.error('Missing provider summary', offer);
            process.exit(1);
          }

          if (
            offer.provider.id !== expected.providerId ||
            offer.provider.email !== expected.providerEmail ||
            offer.provider.displayName !== expected.providerEmail ||
            offer.provider.trustScore !== expected.providerTrustScore
          ) {
            console.error('Provider summary mismatch', { provider: offer.provider, expected });
            process.exit(1);
          }
          NODE

      - name: Smoke create deal from offer contract
        run: |
          CLIENT_TOKEN=$(node --input-type=module <<'NODE'
          import { SignJWT } from 'jose';
          const secret = new TextEncoder().encode(process.env.JWT_SECRET);
          const token = await new SignJWT({
            userId: process.env.SMOKE_CLIENT_ID,
            email: 'client-smoke@example.com',
            role: 'member',
          })
            .setProtectedHeader({ alg: 'HS256' })
            .setIssuedAt()
            .setExpirationTime('1h')
            .sign(secret);
          console.log(token);
          NODE
          )
          echo "${CLIENT_TOKEN}" > /tmp/client-token.txt

          status=$(curl -sS -o /tmp/create-deal.json -w '%{http_code}' \
            -H "Authorization: Bearer ${CLIENT_TOKEN}" \
            -H 'Content-Type: application/json' \
            -d "{\"offerId\":\"${SMOKE_OFFER_ID}\"}" \
            http://127.0.0.1:3000/api/v1/deals)

          cat /tmp/create-deal.json
          if [ "$status" != "201" ]; then
            echo "Expected 201 for create deal from offer, got ${status}"
            exit 1
          fi

          node <<'NODE'
          const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync('/tmp/create-deal.json', 'utf8'));
          const deal = payload.data;

          if (!deal) {
            console.error('Missing data wrapper', payload);
            process.exit(1);
          }

          const expected = {
            offerId: process.env.SMOKE_OFFER_ID,
            providerId: process.env.SMOKE_PROVIDER_ID,
            clientId: process.env.SMOKE_CLIENT_ID,
            title: 'Smoke Test Offer Detail',
            amount: 123,
            currency: 'USD',
          };

          const failures = [];
          if (deal.offerId !== expected.offerId) failures.push(['offerId', deal.offerId, expected.offerId]);
          if (deal.providerId !== expected.providerId) failures.push(['providerId', deal.providerId, expected.providerId]);
          if (deal.clientId !== expected.clientId) failures.push(['clientId', deal.clientId, expected.clientId]);
          if (deal.status !== 'created') failures.push(['status', deal.status, 'created']);
          if (deal.title !== expected.title) failures.push(['title', deal.title, expected.title]);
          if (deal.amount !== expected.amount) failures.push(['amount', deal.amount, expected.amount]);
          if (deal.currency !== expected.currency) failures.push(['currency', deal.currency, expected.currency]);
          if (!deal.offer || deal.offer.id !== expected.offerId) failures.push(['offer.id', deal.offer?.id, expected.offerId]);
          if (!deal.provider || deal.provider.id !== expected.providerId) failures.push(['provider.id', deal.provider?.id, expected.providerId]);
          if (!deal.client || deal.client.id !== expected.clientId) failures.push(['client.id', deal.client?.id, expected.clientId]);

          if (failures.length) {
            console.error('Create deal from offer contract mismatch', failures, deal);
            process.exit(1);
          }

          fs.writeFileSync('/tmp/smoke-deal-id.txt', deal.id);
          NODE

      - name: Smoke deal detail contract
        run: |
          CLIENT_TOKEN=$(cat /tmp/client-token.txt)
          SMOKE_DEAL_ID=$(cat /tmp/smoke-deal-id.txt)

          status=$(curl -sS -o /tmp/deal-detail.json -w '%{http_code}' \
            -H "Authorization: Bearer ${CLIENT_TOKEN}" \
            "http://127.0.0.1:3000/api/v1/deals/${SMOKE_DEAL_ID}")

          cat /tmp/deal-detail.json
          if [ "$status" != "200" ]; then
            echo "Expected 200 for deal detail, got ${status}"
            exit 1
          fi

          node <<'NODE'
          const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync('/tmp/deal-detail.json', 'utf8'));
          const deal = payload.data;
          const expectedDealId = fs.readFileSync('/tmp/smoke-deal-id.txt', 'utf8').trim();

          if (!deal) {
            console.error('Missing data wrapper', payload);
            process.exit(1);
          }

          const expected = {
            id: expectedDealId,
            offerId: process.env.SMOKE_OFFER_ID,
            providerId: process.env.SMOKE_PROVIDER_ID,
            clientId: process.env.SMOKE_CLIENT_ID,
            title: 'Smoke Test Offer Detail',
            amount: 123,
            currency: 'USD',
          };

          const failures = [];
          if (deal.id !== expected.id) failures.push(['id', deal.id, expected.id]);
          if (deal.offerId !== expected.offerId) failures.push(['offerId', deal.offerId, expected.offerId]);
          if (deal.providerId !== expected.providerId) failures.push(['providerId', deal.providerId, expected.providerId]);
          if (deal.clientId !== expected.clientId) failures.push(['clientId', deal.clientId, expected.clientId]);
          if (deal.status !== 'created') failures.push(['status', deal.status, 'created']);
          if (deal.title !== expected.title) failures.push(['title', deal.title, expected.title]);
          if (deal.amount !== expected.amount) failures.push(['amount', deal.amount, expected.amount]);
          if (deal.currency !== expected.currency) failures.push(['currency', deal.currency, expected.currency]);
          if (!Array.isArray(deal.milestones)) failures.push(['milestones', typeof deal.milestones, 'array']);
          if (!Array.isArray(deal.transactions)) failures.push(['transactions', typeof deal.transactions, 'array']);
          if (!deal.offer || deal.offer.id !== expected.offerId) failures.push(['offer.id', deal.offer?.id, expected.offerId]);
          if (!deal.provider || deal.provider.id !== expected.providerId) failures.push(['provider.id', deal.provider?.id, expected.providerId]);
          if (!deal.client || deal.client.id !== expected.clientId) failures.push(['client.id', deal.client?.id, expected.clientId]);

          if (failures.length) {
            console.error('Deal detail contract mismatch', failures, deal);
            process.exit(1);
          }
          NODE

      - name: Smoke protected routes require authentication
        run: |
          check_unauthenticated() {
            path="$1"
            status=$(curl -sS -o /tmp/smoke-response.json -w '%{http_code}' "http://127.0.0.1:3000${path}")
            cat /tmp/smoke-response.json
            if [ "$status" != "401" ]; then
              echo "Expected 401 for ${path}, got ${status}"
              exit 1
            fi
            node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('/tmp/smoke-response.json','utf8')); if(!data.error || data.error.code !== 'AUTHENTICATION_ERROR') { console.error(data); process.exit(1); }"
          }

          check_unauthenticated /api/v1/notifications
          check_unauthenticated /api/v1/deals
          check_unauthenticated /api/v1/withdraw
          check_unauthenticated /api/v1/admin/overview

      - name: Print backend logs on failure
        if: failure()
        run: cat backend-smoke.log || true

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend-smoke.pid ]; then
            kill $(cat backend-smoke.pid) || true
          fi
