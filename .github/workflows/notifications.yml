# ============================================
# Notifications Workflow
# Send notifications for important events
# ============================================

name: Notifications

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types: [published]
  issues:
    types: [opened, closed]
  pull_request:
    types: [opened, closed]
  workflow_run:
    workflows: ["CI", "Deploy to Production"]
    types: [completed]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure' || github.event_name != 'workflow_run'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------
      # Discord Notification
      # ----------------------------------------
      - name: Discord Notification
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: ${{ github.event_name }}
          description: |
            Event: ${{ github.event_name }}
            Repository: ${{ github.repository }}
            Actor: ${{ github.actor }}
            ${{ github.event_name == 'push' && format('Commit: {0}', github.sha) || '' }}
            ${{ github.event_name == 'release' && format('Release: {0}', github.event.release.tag_name) || '' }}
          status: ${{ job.status }}
          color: |
            ${{
              github.event.workflow_run.conclusion == 'success' && '0x00FF00' ||
              github.event.workflow_run.conclusion == 'failure' && '0xFF0000' ||
              '0x808080'
            }}
          username: GitHub Actions

      # ----------------------------------------
      # Slack Notification (Optional)
      # ----------------------------------------
      - name: Slack Notification
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
          text: |
            ${{ github.event.workflow_run.conclusion == 'failure' && '❌ Workflow failed!' || '✅ Workflow completed' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

  # ----------------------------------------
  # Security Alerts
  # ----------------------------------------
  security-alert:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.event.head_commit.message, 'security')
    steps:
      - name: Security Alert
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔒 Security Update Required',
              body: `A security-related change was pushed to main.

            - **Commit:** ${context.sha}
            - **Message:** ${context.payload.head_commit.message}
            - **Author:** ${context.payload.head_commit.author.name}

            Please review and ensure all security measures are in place.`,
              labels: ['security', 'needs-review']
            });

  # ----------------------------------------
  # Failed Deploy Alert
  # ----------------------------------------
  deploy-failure:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.name == 'Deploy to Production'
    steps:
      - name: Deploy Failure Alert
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Production Deployment Failed',
              body: `Production deployment failed!

            - **Workflow:** ${context.payload.workflow_run.name}
            - **Run ID:** ${context.payload.workflow_run.id}
            - **URL:** ${context.payload.workflow_run.html_url}

            Please investigate immediately.`,
              labels: ['bug', 'production', 'urgent']
            });

      - name: Ping on Failure
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: (await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'production,urgent',
                per_page: 1
              })).data[0].number,
              body: '@earthkingdomuniverse-cell Production deployment failed! Please check.'
            });
