/**
 * Performance Test Workflow
 * Task 8.2: Performance Test Workflow
 * 
 * GitHub Actions workflow for running performance tests
 */

name: Performance Tests

on:
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Performance test type'
        required: true
        default: 'load'
        type: choice
        options:
          - load
          - stress
          - spike
          - endurance
      duration:
        description: 'Test duration (minutes)'
        required: false
        default: '5'
      virtual_users:
        description: 'Number of virtual users'
        required: false
        default: '100'
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/performance.yml'

env:
  NODE_VERSION: '20.19.0'
  PERFORMANCE_THRESHOLD_P95: '200' # ms
  PERFORMANCE_THRESHOLD_P99: '500' # ms
  ERROR_RATE_THRESHOLD: '1' # %

jobs:
  # ----------------------------------------
  # Job 1: Setup Test Environment
  # ----------------------------------------
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D786D22C9D481491F9D0
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Verify k6 installation
        run: k6 version

  # ----------------------------------------
  # Job 2: Load Test
  # ----------------------------------------
  load-test:
    name: Load Test
    runs-on: ubuntu-latest
    needs: setup
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.test_type == 'load' ||
      github.event.inputs.test_type == 'all'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Start application
        run: |
          npm run build
          npm start &
          sleep 10
          curl -f http://localhost:3000/health || exit 1

      - name: Run load test
        run: |
          k6 run \
            --out json=./reports/load-test-results.json \
            --summary-export=./reports/load-test-summary.json \
            tests/performance/load-test.js

      - name: Generate load test report
        run: |
          node scripts/generate-performance-report.js \
            --input ./reports/load-test-summary.json \
            --output ./reports/load-test-report.md

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results
          path: |
            ./reports/load-test-results.json
            ./reports/load-test-summary.json
            ./reports/load-test-report.md

      - name: Check performance thresholds
        run: |
          p95=$(jq '.metrics.http_req_duration.values["p(95)"] // 0' ./reports/load-test-summary.json)
          error_rate=$(jq '.metrics.http_req_failed.values.rate // 1' ./reports/load-test-summary.json)
          
          echo "P95 Response Time: ${p95}ms"
          echo "Error Rate: ${error_rate}%"
          
          if (( $(echo "$p95 > ${{ env.PERFORMANCE_THRESHOLD_P95 }}" | bc -l) )); then
            echo "❌ P95 response time exceeded threshold"
            exit 1
          fi
          
          if (( $(echo "$error_rate > ${{ env.ERROR_RATE_THRESHOLD }}" | bc -l) )); then
            echo "❌ Error rate exceeded threshold"
            exit 1
          fi
          
          echo "✅ Performance thresholds passed"

  # ----------------------------------------
  # Job 3: Stress Test
  # ----------------------------------------
  stress-test:
    name: Stress Test
    runs-on: ubuntu-latest
    needs: setup
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.test_type == 'stress' ||
       github.event.inputs.test_type == 'all')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Start application
        run: |
          npm run build
          npm start &
          sleep 10

      - name: Run stress test
        run: |
          k6 run \
            --out json=./reports/stress-test-results.json \
            --summary-export=./reports/stress-test-summary.json \
            tests/performance/stress-test.js

      - name: Upload stress test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-test-results
          path: ./reports/stress-*.json

  # ----------------------------------------
  # Job 4: Spike Test
  # ----------------------------------------
  spike-test:
    name: Spike Test
    runs-on: ubuntu-latest
    needs: setup
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.test_type == 'spike'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Start application
        run: |
          npm run build
          npm start &
          sleep 10

      - name: Run spike test
        run: |
          k6 run \
            --out json=./reports/spike-test-results.json \
            --summary-export=./reports/spike-test-summary.json \
            tests/performance/spike-test.js

      - name: Upload spike test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spike-test-results
          path: ./reports/spike-*.json

  # ----------------------------------------
  # Job 5: Report Generation
  # ----------------------------------------
  report:
    name: Generate Report
    runs-on: ubuntu-latest
    needs: [load-test, stress-test]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: ./reports

      - name: Generate combined report
        run: |
          node scripts/combine-performance-reports.js \
            --output ./reports/performance-report.md

      - name: Upload combined report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: ./reports/performance-report.md

      - name: Comment on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('./reports/performance-report.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Performance Test Results\n\n' + report,
            });

      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          channel: '#qa-alerts'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          text: |
            Performance tests completed: ${{ job.status }}
            [View Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

  # ----------------------------------------
  # Job 6: Update Dashboard
  # ----------------------------------------
  update-dashboard:
    name: Update Performance Dashboard
    runs-on: ubuntu-latest
    needs: report
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download performance report
        uses: actions/download-artifact@v4
        with:
          name: performance-report
          path: ./reports

      - name: Update Grafana dashboard
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GRAFANA_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @./reports/performance-metrics.json \
            ${{ secrets.GRAFANA_URL }}/api/dashboards/db
