# ============================================
# Stale Bot Configuration
# Automatically manage stale issues and PRs
# https://probot.github.io/apps/stale/
# ============================================

# Number of days of inactivity before an issue becomes stale
 daysUntilStale: 60

# Number of days of inactivity before a stale issue is closed
 daysUntilClose: 7

# Issues with these labels will never be considered stale
 exemptLabels:
   - pinned
   - security
   - todo
   - in-progress
   - "priority: high"
   - "priority: critical"

# Set to true to ignore issues in a project (defaults to false)
 exemptProjects: false

# Set to true to ignore issues in a milestone (defaults to false)
 exemptMilestones: true

# Set to true to ignore issues with an assignee (defaults to false)
 exemptAssignees: false

# Label to use when marking an issue as stale
 staleLabel: stale

# Comment to post when marking an issue as stale
 markComment: >
   This issue has been automatically marked as stale because it has not had
   recent activity. It will be closed if no further activity occurs.

   If this issue is still relevant, please comment to keep it open.
   Thank you for your contributions!

# Comment to post when closing a stale issue
 closeComment: >
   This issue has been automatically closed due to inactivity.
   Feel free to reopen if it becomes relevant again.

# Limit to only `issues` or `pulls`
 only: issues

# Optionally, specify configuration settings that are specific to issues
 issues:
   # Comment to post when marking as stale
   markComment: >
     👋 Hi there!

     This issue has been automatically marked as **stale** because it hasn't seen activity in 60 days.

     It will be automatically closed in 7 days if no further activity occurs.

     If this issue is still important to you, please add a comment to keep it open.

   # Comment to post when closing a stale issue
   closeComment: >
     🔒 This issue has been automatically closed due to inactivity.

     If you believe this issue is still valid, please reopen it or create a new issue.

# Optionally, specify configuration settings that are specific to PRs
 pulls:
   # Number of days of inactivity before a PR becomes stale
   daysUntilStale: 30

   # Number of days of inactivity before a stale PR is closed
   daysUntilClose: 7

   # Comment to post when marking as stale
   markComment: >
     👋 Hi there!

     This pull request has been automatically marked as **stale** because it hasn't seen activity in 30 days.

     It will be automatically closed in 7 days if no further activity occurs.

     If you're still working on this, please comment to keep it open.

   # Comment to post when closing a stale PR
   closeComment: >
     🔒 This pull request has been automatically closed due to inactivity.

     Feel free to reopen it if you want to continue working on it.
