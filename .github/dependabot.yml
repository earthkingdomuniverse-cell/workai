# ============================================
# Dependabot Configuration
# Automated dependency updates
# ============================================

version: 2
updates:
  # ----------------------------------------
  # Node.js / npm
  # ----------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 10
    reviewers:
      - "earthkingdomuniverse-cell"
    assignees:
      - "earthkingdomuniverse-cell"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      # Group minor and patch updates
      minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Group dev dependencies
      dev-dependencies:
        dependency-type: "development"
    ignore:
      # Ignore major version updates (manual review required)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ----------------------------------------
  # GitHub Actions
  # ----------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 5
    reviewers:
      - "earthkingdomuniverse-cell"
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"

  # ----------------------------------------
  # Docker
  # ----------------------------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 3
    reviewers:
      - "earthkingdomuniverse-cell"
    labels:
      - "dependencies"
      - "docker"
      - "automated"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
