name: ✨ Feature Request
description: Suggest an idea for WorkAI
body:
  - type: textarea
    id: problem
    attributes:
      label: Vấn đề của bạn có liên quan đến một trở ngại nào không?
      description: Mô tả rõ ràng và ngắn gọn về vấn đề là gì. Ví dụ: Tôi luôn bực bội khi [...]
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Giải pháp mong muốn
      description: Mô tả rõ ràng và ngắn gọn về những gì bạn muốn xảy ra.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Các giải pháp thay thế
      description: Mô tả rõ ràng và ngắn gọn về bất kỳ giải pháp hoặc tính năng thay thế nào bạn đã xem xét.
  - type: textarea
    id: context
    attributes:
      label: Ngữ cảnh bổ sung
      description: Thêm bất kỳ thông tin hoặc ảnh chụp màn hình nào khác về yêu cầu tính năng ở đây.
