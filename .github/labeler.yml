# ============================================
# Labeler Configuration
# Automatically labels based on file changes
# https://github.com/actions/labeler
# ============================================

# Source code
backend:
  - src/**
  - any: ['*.ts', '*.js', '*.mjs']
    all: ['!*.test.ts', '!*.test.js', '!*.spec.ts', '!*.spec.js']

# Tests
tests:
  - '**/*.test.ts'
  - '**/*.test.js'
  - '**/*.spec.ts'
  - '**/*.spec.js'
  - '**/__tests__/**'
  - '**/test/**'
  - '**/tests/**'
  - jest.config.*
  - vitest.config.*

# Documentation
docs:
  - '**/*.md'
  - 'docs/**'
  - LICENSE
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - SECURITY.md

# CI/CD
ci:
  - .github/workflows/**
  - .github/dependabot.yml
  - .github/release-drafter.yml
  - .github/labeler.yml
  - .github/pr-labeler.yml

# Docker
docker:
  - Dockerfile
  - docker-compose*.yml
  - .dockerignore
  - .docker/**

# Database
database:
  - prisma/**
  - supabase/**
  - '**/*.sql'
  - '**/migrations/**'

# Configuration
config:
  - package*.json
  - tsconfig.json
  - '*.config.*'
  - .env.example
  - .editorconfig
  - .prettierrc*
  - .eslintrc*

# Scripts
scripts:
  - scripts/**
  - '**/*.sh'

# Mobile
mobile:
  - mobile/**
  - app/**
  - '**/*.mobile.*'

# Dependencies
dependencies:
  - package*.json
  - yarn.lock
  - pnpm-lock.yaml
  - bun.lockb
